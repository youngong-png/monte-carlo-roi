services:
  - type: web
    name: monte-carlo-roi
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run monte_carlo_simulator.py --server.port $PORT --server.headless true --server.address 0.0.0.0
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
